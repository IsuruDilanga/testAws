version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing Angular CLI..."
      - npm install -g @angular/cli

  pre_build:
    commands:
      - echo "Installing project dependencies..."
      - cd Frontend/testAws
      - npm install

  build:
    commands:
      - echo "Building Angular app..."
      - ng build --configuration production

  post_build:
    commands:
      - echo "Syncing build output to S3..."
      - aws s3 sync dist/testAws/browser/ s3://testaws-frontend --delete
      - echo "Deployment completed!"
      
artifacts:
  files:
    - '**/*'
  base-directory: Frontend/testAws/dist/testAws
