version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install -g @angular/cli

  build:
    commands:
      - cd Frontend/testAws
      - npm install
      - ng build --configuration production

  post_build:
    commands:
      - aws s3 sync dist/testAws/browser/ s3://testaws-frontend --delete

# Optional: remove artifacts if S3 upload is enough
artifacts:
  files:
    - dist/testAws/browser/**/*
  discard-paths: yes
