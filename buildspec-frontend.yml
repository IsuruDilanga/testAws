version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing Angular CLI"
      - npm install -g @angular/cli

  build:
    commands:
      - echo "Entering frontend folder"
      - cd Frontend/testAws
      - npm install
      - ng build --configuration production

artifacts:
  files:
    - Frontend/testAws/dist/testAws/browser/**/*
  discard-paths: yes
