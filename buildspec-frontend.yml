version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20  
    commands:
      - npm install -g @angular/cli

  pre_build:
    commands:
      - cd Frontend/testAws
      - npm install

  build:
    commands:
      - ng build --configuration production

  post_build:
    commands:
      - aws s3 sync . s3://testaws-frontend --delete
