version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 24
    commands:
      - npm install -g @angular/cli

  build:
    commands:
      - cd Frontend/testAws
      - npm install
      - ng build --configuration production

  post_build:
    commands:
      - aws s3 sync dist/testAws/browser/ s3://YOUR_S3_BUCKET_NAME --delete
      
artifacts:
  files:
    - Frontend/testAws/dist/testAws/browser/**/*
  discard-paths: yes
