version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install -g @angular/cli
  build:
    commands:
      - cd Frontend/testAws
      - npm install
      - ng build --configuration production
      - cp -r dist/testAws/browser/* ../backend/src/main/resources/static/
artifacts:
  files:
    - backend/target/*.jar
  discard-paths: yes
