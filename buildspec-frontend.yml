version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm install -g @angular/cli

  pre_build:
    commands:
      - cd Frontend/testAws
      - npm install

  build:
    commands:
      - ng build --configuration production

  post_build:
    commands:
      - echo "Build completed on $(date)"

artifacts:
  files:
    - '**/*'
  base-directory: Frontend/testAws/dist/testAws
